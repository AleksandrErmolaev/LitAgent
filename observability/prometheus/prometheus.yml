global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:8000']
    metrics_path: '/metrics'

  - job_name: 'summarizer'
    static_configs:
      - targets: ['summarizer:8000']

  - job_name: 'qa_agent'
    static_configs:
      - targets: ['qa_agent:8000']

  - job_name: 'memory_agent'
    static_configs:
      - targets: ['memory_agent:8000']

  - job_name: 'cadvisor'
    static_configs:
      - targets: [ 'cadvisor:8080' ]

